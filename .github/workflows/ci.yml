name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  daemon:
    name: Daemon (typecheck + tests)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

  web:
    name: Dashboard (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        # web/ has no committed lockfile yet; tighten to --frozen-lockfile
        # once web/bun.lockb is in the repo.
        run: bun install

      - name: Typecheck + build
        run: bun run build
